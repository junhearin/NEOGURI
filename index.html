<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>아이온2 레이드 신청</title>

<style>
body{
font-family:sans-serif;
max-width:700px;
margin:auto;
padding:30px;
}

input,select,button{
padding:10px;
margin:5px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:10px;
text-align:center;
}
</style>

</head>

<body>

<h2>아이온2 레이드 신청</h2>

<input id="name" placeholder="닉네임">

<select id="class">
<option>탱커</option>
<option>딜러</option>
<option>힐러</option>
</select>

<input id="time" placeholder="가능 시간">

<button onclick="submitRaid()">신청</button>

<table id="raidTable">
<tr>
<th>닉네임</th>
<th>직업</th>
<th>시간</th>
</tr>
</table>

<script>

const API="https://script.google.com/macros/s/AKfycbzvC6_VzZJsQA1ZdNwx3wjGdiUgK1Dl1U-c5FXzsiQ3FVXEg5fGi0lPy_dW-6PP-Rn2/exec"

function submitRaid(){

const name=document.getElementById("name").value
const job=document.getElementById("class").value
const time=document.getElementById("time").value

fetch(API,{
method:"POST",
body:JSON.stringify({
name:name,
class:job,
time:time
})
}).then(()=>{
loadData()
})

}

function loadData(){

fetch(API)
.then(res=>res.json())
.then(data=>{

const table=document.getElementById("raidTable")

table.innerHTML=`<tr>
<th>닉네임</th>
<th>직업</th>
<th>시간</th>
</tr>`

for(let i=1;i<data.length;i++){

table.innerHTML+=`
<tr>
<td>${data[i][0]}</td>
<td>${data[i][1]}</td>
<td>${data[i][2]}</td>
</tr>
`

}

})

}

loadData()

</script>

</body>
</html>
